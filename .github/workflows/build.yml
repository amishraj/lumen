name: Build & Release Lumen

# Push a tag like v1.0.0 to cut a release, or run manually from the Actions tab.
#
# 1.1.x (Aurora beta) tags are published as PRE-releases: GitHub's
# releases/latest — and therefore the classic Downloader code that points at
# it — keeps serving the stable 1.0 line until Aurora graduates. When it
# does, drop the v1.1. prefix from the prerelease expressions below.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Per-ABI APKs (smaller) + a universal APK that installs on any device,
      # including Google TV / Android TV (leanback launcher is declared).
      - run: flutter build apk --release --split-per-abi
      - run: flutter build apk --release
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/Lumen-universal.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/Lumen-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/Lumen-armv7.apk || true
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*.apk
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v1.1.') }}
          files: dist/*.apk

  macos:
    name: macOS (.app zip)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip app
        run: |
          mkdir -p dist
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/dist/Lumen-macOS.zip" Lumen.app || \
          zip -r -y "$GITHUB_WORKSPACE/dist/Lumen-macOS.zip" *.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v1.1.') }}
          files: dist/*.zip

  ios:
    name: iOS (unsigned IPA for sideloading)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Unsigned build — install with AltStore / Sideloadly / your own cert.
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        run: |
          mkdir -p dist Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r -y dist/Lumen-iOS-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*.ipa
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v1.1.') }}
          files: dist/*.ipa
